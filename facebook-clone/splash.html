<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook</title>

  <!-- Css -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/splash.css" />

  <!-- Favicon -->
  <link rel="shortcut icon" href="./assets/logos/facebook-logo.svg" type="image/x-icon">
</head>

<body>

    <div class="splash-center">
      <img src="assets/logos/facebook-logo.svg" alt="Facebook Logo" class="fb-logo" />

    <footer class="splash-footer">
      <img src="assets/logos/meta-logo.svg" alt="Meta" class="meta-logo" />

  <script>
    // After 2 seconds, navigate to the login page
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2200);
  </script>

</html>
